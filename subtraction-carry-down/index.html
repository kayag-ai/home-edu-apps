<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaya's Math Drill (Touch)</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f4f8; touch-action: manipulation; }
        #status { font-size: 1.5rem; margin-bottom: 10px; color: #555; height: 2rem; }
        #question { font-size: 6rem; font-weight: bold; color: #2c3e50; margin-bottom: 20px; }
        
        /* テンキーのレイアウト */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; max-width: 400px; }
        .key { 
            padding: 30px; font-size: 2.5rem; font-weight: bold; cursor: pointer; 
            background: white; color: #3498db; border: 3px solid #3498db; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s, background 0.1s;
        }
        .key:active { transform: scale(0.95); background: #3498db; color: white; }
        
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f4f8; display: flex; align-items: center; justify-content: center; z-index: 10; }
        #start-btn { padding: 20px 40px; font-size: 2rem; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="start-screen">
        <button id="start-btn">練習をはじめる</button>
    </div>

    <div id="status"></div>
    <div id="question">?-?</div>
    
    <div class="keypad">
        <div class="key" onclick="checkAnswer(1)">1</div>
        <div class="key" onclick="checkAnswer(2)">2</div>
        <div class="key" onclick="checkAnswer(3)">3</div>
        <div class="key" onclick="checkAnswer(4)">4</div>
        <div class="key" onclick="checkAnswer(5)">5</div>
        <div class="key" onclick="checkAnswer(6)">6</div>
        <div class="key" onclick="checkAnswer(7)">7</div>
        <div class="key" onclick="checkAnswer(8)">8</div>
        <div class="key" onclick="checkAnswer(9)">9</div>
    </div>

    <script>
        const questionEl = document.getElementById('question');
        const statusEl = document.getElementById('status');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');

        let currentAnswer = 0;

        function generateQuestion() {
            const problems = [];
            for (let i = 11; i <= 18; i++) {
                for (let j = i - 9; j <= 9; j++) {
                    if (j > 0 && (i % 10) < j) problems.push({q: `${i} - ${j}`, a: i - j});
                }
            }
            return problems[Math.floor(Math.random() * problems.length)];
        }

        function askQuestion() {
            window.speechSynthesis.cancel();
            const problem = generateQuestion();
            currentAnswer = problem.a;
            questionEl.textContent = problem.q;
            statusEl.textContent = "こたえを おしてね";
            
            const uttr = new SpeechSynthesisUtterance(problem.q.replace('-', 'ひく') + 'は？');
            uttr.lang = 'ja-JP';
            window.speechSynthesis.speak(uttr);
        }

        function checkAnswer(num) {
            if (num === currentAnswer) {
                statusEl.textContent = "せいかい！ ✨";
                const correctUttr = new SpeechSynthesisUtterance("正解！");
                window.speechSynthesis.speak(correctUttr);
                // 正解時に少し待って次の問題へ
                setTimeout(askQuestion, 800);
            } else {
                statusEl.textContent = "ざんねん！ もういちど 🤔";
                const wrongUttr = new SpeechSynthesisUtterance("ちがうよ、もう一回");
                window.speechSynthesis.speak(wrongUttr);
            }
        }

        startBtn.onclick = () => {
            startScreen.style.display = 'none';
            askQuestion();
        };
    </script>
</body>
</html>
