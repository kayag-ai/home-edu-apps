<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaya's Math Attack</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f4f8; touch-action: manipulation; }
        #status-bar { width: 90%; display: flex; justify-content: space-between; font-size: 1.2rem; color: #555; margin-bottom: 10px; max-width: 400px; }
        #question { font-size: 6rem; font-weight: bold; color: #2c3e50; margin-bottom: 20px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; max-width: 400px; }
        .key { 
            padding: 30px; font-size: 2.5rem; font-weight: bold; cursor: pointer; 
            background: white; color: #3498db; border: 3px solid #3498db; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { background: #3498db; color: white; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        #start-btn, #retry-btn { padding: 20px 40px; font-size: 2rem; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 15px; }
        #result-display { font-size: 2rem; color: #2c3e50; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="result-display">36もん ぜんぶとけるかな？</div>
        <button id="start-btn">スタート！</button>
    </div>

    <div id="status-bar">
        <div id="timerDisplay">タイム: 0.0秒</div>
        <div id="progressDisplay">のこり: 36もん</div>
    </div>
    <div id="question">?-?</div>
    
    <div class="keypad">
        <div class="key" onclick="checkAnswer(1)">1</div>
        <div class="key" onclick="checkAnswer(2)">2</div>
        <div class="key" onclick="checkAnswer(3)">3</div>
        <div class="key" onclick="checkAnswer(4)">4</div>
        <div class="key" onclick="checkAnswer(5)">5</div>
        <div class="key" onclick="checkAnswer(6)">6</div>
        <div class="key" onclick="checkAnswer(7)">7</div>
        <div class="key" onclick="checkAnswer(8)">8</div>
        <div class="key" onclick="checkAnswer(9)">9</div>
    </div>

    <script>
        let problems = [];
        let currentProblem = null;
        let startTime = 0;
        let timerInterval = null;

        const questionEl = document.getElementById('question');
        const timerEl = document.getElementById('timerDisplay');
        const progressEl = document.getElementById('progressDisplay');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const resultDisplay = document.getElementById('result-display');

        function initProblems() {
            problems = [];
            for (let i = 11; i <= 18; i++) {
                for (let j = i - 9; j <= 9; j++) {
                    if (j > 0 && (i % 10) < j) problems.push({q: `${i} - ${j}`, a: i - j});
                }
            }
        }

        function askNextQuestion() {
            if (problems.length === 0) {
                finishGame();
                return;
            }
            
            progressEl.textContent = `のこり: ${problems.length}もん`;
            const index = Math.floor(Math.random() * problems.length);
            currentProblem = problems[index];
            problems.splice(index, 1); // 出題した問題をリストから削除

            questionEl.textContent = currentProblem.q;
            
            const uttr = new SpeechSynthesisUtterance(currentProblem.q.replace('-', 'ひく') + 'は？');
            uttr.lang = 'ja-JP';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(uttr);
        }

        function checkAnswer(num) {
            if (num === currentProblem.a) {
                const correctUttr = new SpeechSynthesisUtterance("せいかい！");
                window.speechSynthesis.speak(correctUttr);
                askNextQuestion();
            } else {
                const wrongUttr = new SpeechSynthesisUtterance("ちがうよ");
                window.speechSynthesis.speak(wrongUttr);
            }
        }

        function finishGame() {
            clearInterval(timerInterval);
            const totalTime = ((performance.now() - startTime) / 1000).toFixed(1);
            resultDisplay.innerHTML = `ぜんもんせいかい！✨<br>タイム: ${totalTime}びょう`;
            startBtn.textContent = "もういっかい！";
            overlay.style.display = 'flex';
        }

        startBtn.onclick = () => {
            initProblems();
            overlay.style.display = 'none';
            startTime = performance.now();
            timerInterval = setInterval(() => {
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
                timerEl.textContent = `タイム: ${elapsed}秒`;
            }, 100);
            askNextQuestion();
        };
    </script>
</body>
</html>
