<!DOCTYPE html>
<html lang="ja">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Morning Mission</title>
 <style>
  body {
   font-family: 'Helvetica Neue', Arial, sans-serif;
   display: flex;
   flex-direction: column;
   align-items: center;
   min-height: 100vh;
   margin: 0;
   padding: 20px 0;
   background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
   touch-action: manipulation;
   overflow-y: auto;
  }
  #header { text-align: center; margin-bottom: 10px; }
  #main-title {
   font-size: 2rem; font-weight: 900; color: #c2410c;
   text-shadow: 2px 2px 0px white; margin: 0;
  }
  #sub-title { font-size: 0.9rem; color: #f97316; font-weight: bold; }
  #clock-container {
   font-size: 2.8rem; font-weight: 900; color: #1e293b;
   margin: 5px 0; letter-spacing: 2px;
  }
  #timer-display-area {
   height: 3.2rem; display: flex; align-items: center;
   justify-content: center; margin-bottom: 6px;
  }
  #timer-display {
   font-size: 1.8rem; color: #ea580c; font-weight: bold; display: none;
  }
  #meal-select {
   display: flex; flex-direction: column; align-items: center; gap: 6px;
   margin-bottom: 10px;
  }
  #meal-select-label {
   font-size: 0.85rem; color: #92400e; font-weight: bold;
  }
  #meal-buttons { display: flex; gap: 10px; }
  .meal-btn {
   padding: 10px 20px; font-size: 1.1rem; border-radius: 50px;
   border: 2px solid #f97316; background: white; color: #f97316;
   font-weight: bold; cursor: pointer; transition: all 0.1s;
  }
  .meal-btn:active { transform: translateY(2px); }
  .meal-btn.selected {
   background: #f97316; color: white; box-shadow: 0 3px #ea580c;
  }
  #start-btn {
   padding: 10px 28px; font-size: 1.1rem; border-radius: 50px;
   border: none; background: #d1d5db; color: white;
   font-weight: bold; cursor: not-allowed; margin-top: 4px;
   transition: all 0.2s;
  }
  #start-btn.ready {
   background: #f97316; cursor: pointer; box-shadow: 0 3px #ea580c;
  }
  #start-btn.ready:active { transform: translateY(2px); box-shadow: 0 1px #ea580c; }
  #race-canvas {
   width: 90%; max-width: 400px; height: 110px; border-radius: 20px;
   background: white; border: 3px solid #fff;
   box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 16px; display: block;
  }
  .task-list {
   width: 95%; max-width: 400px; margin: 0 auto;
   display: grid; grid-template-columns: repeat(2, 1fr);
   gap: 12px; padding: 10px; box-sizing: border-box;
  }
  .task-item {
   background: white; aspect-ratio: 1 / 1; border-radius: 18px;
   display: flex; flex-direction: column; align-items: center;
   justify-content: center; font-size: 1.1rem; font-weight: bold;
   box-shadow: 0 5px 0px #fed7aa; cursor: pointer; transition: all 0.1s;
   border: 2px solid transparent; box-sizing: border-box; text-align: center;
  }
  .task-item:active { transform: translateY(3px); box-shadow: 0 2px 0px #fed7aa; }
  .task-item.done {
   background: #fef9c3; color: #d97706; text-decoration: line-through;
   opacity: 0.7; box-shadow: none; transform: translateY(3px); border-color: #f59e0b;
  }
  .task-icon { font-size: 2rem; margin-bottom: 5px; pointer-events: none; }
  .task-text { pointer-events: none; }
  #result-overlay {
   position: fixed; top: 0; left: 0; width: 100%; height: 100%;
   background: rgba(255,255,255,0.98); display: none; flex-direction: column;
   align-items: center; justify-content: center; z-index: 10; text-align: center;
  }
  .result-emoji { font-size: 6rem; }
  .result-text {
   font-size: 1.8rem; font-weight: bold; margin: 20px;
   white-space: pre-wrap; color: #c2410c;
  }
  #retry-btn {
   padding: 15px 45px; font-size: 1.6rem; border-radius: 20px; border: none;
   background: #f97316; color: white; box-shadow: 0 6px #ea580c; font-weight: bold;
  }
 </style>
</head>

<body>
 <div id="header">
  <p id="sub-title">＼ さあ、レース スタート！ ／</p>
  <h1 id="main-title">あさのミッション！</h1>
 </div>

 <div id="clock-container">00:00:00</div>

 <div id="timer-display-area">
  <div id="timer-display"></div>
 </div>

 <div id="meal-select">
  <div id="meal-select-label">🍚 ごはん、あと何分？</div>
  <div id="meal-buttons">
   <button class="meal-btn" onclick="selectMeal(this, 15)">15分</button>
   <button class="meal-btn" onclick="selectMeal(this, 20)">20分</button>
   <button class="meal-btn" onclick="selectMeal(this, 25)">25分</button>
  </div>
  <button id="start-btn" onclick="startMission()" disabled>🚀 スタート！</button>
 </div>

 <canvas id="race-canvas"></canvas>

 <div class="task-list" id="task-list">
  <div class="task-item" onclick="toggleTask(this)"><span class="task-icon">🍚</span><span class="task-text">あさごはん</span></div>
  <div class="task-item" onclick="toggleTask(this)"><span class="task-icon">🚽</span><span class="task-text">トイレ</span></div>
  <div class="task-item" onclick="toggleTask(this)"><span class="task-icon">🪥</span><span class="task-text">はみがき</span></div>
  <div class="task-item" onclick="toggleTask(this)"><span class="task-icon">👕</span><span class="task-text">きがえ</span></div>
 </div>

 <div id="result-overlay">
  <div class="result-emoji" id="res-emoji"></div>
  <div class="result-text" id="res-text"></div>
  <button id="retry-btn" onclick="location.reload()">おわり</button>
 </div>

 <script>
  const PREP_SECS   = 15 * 60;
  const TOTAL_TASKS = 4;

  let selectedMealMins  = null;
  let rabbitStartBonus  = 0.5; // startMission時に動的に計算
  let countdownStarted  = false;
  let endTime          = null;
  let totalSeconds     = 0;
  let tasksDone        = 0;
  let animFrame        = 0;
  let isFinished       = false;

  const clockEl   = document.getElementById('clock-container');
  const timerEl   = document.getElementById('timer-display');
  const mealSelect = document.getElementById('meal-select');
  const startBtn  = document.getElementById('start-btn');
  const overlay   = document.getElementById('result-overlay');
  const resEmoji  = document.getElementById('res-emoji');
  const resText   = document.getElementById('res-text');

  const canvas = document.getElementById('race-canvas');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas() {
   canvas.width  = canvas.offsetWidth;
   canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ── 食事時間選択 ──────────────────────
  function selectMeal(btn, mins) {
   document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('selected'));
   btn.classList.add('selected');
   selectedMealMins = mins;
   startBtn.disabled = false;
   startBtn.classList.add('ready');
  }

  // ── ミッション開始 ────────────────────
  function startMission() {
   if (!selectedMealMins) return;
   totalSeconds     = (selectedMealMins + 15) * 60;
   rabbitStartBonus = selectedMealMins / (selectedMealMins + 15);
   endTime = new Date(new Date().getTime() + totalSeconds * 1000);
   countdownStarted = true;
   mealSelect.style.display = 'none';
   timerEl.style.display = 'block';
   speak(`${selectedMealMins}分でごはん、そのあと支度だね。カメに負けないように出発！`);
  }

  // ── レース描画 ────────────────────────
  function drawRace(remainingSec) {
   const W = canvas.width;
   const H = canvas.height;
   ctx.clearRect(0, 0, W, H);
   ctx.fillStyle = 'white';
   ctx.fillRect(0, 0, W, H);

   const ground = H * 0.62;
   ctx.strokeStyle = '#d97706';
   ctx.lineWidth = 2;
   ctx.beginPath(); ctx.moveTo(0, ground); ctx.lineTo(W, ground); ctx.stroke();

   const goalX = 36;
   ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 3; ctx.setLineDash([6,4]);
   ctx.beginPath(); ctx.moveTo(goalX, ground-38); ctx.lineTo(goalX, ground+2); ctx.stroke();
   ctx.setLineDash([]);
   ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = '#dc2626';
   ctx.textAlign = 'center'; ctx.fillText('ゴール', goalX, ground+16);

   const raceW = W - 30 - goalX;

   // カメ（時間で進む）
   const elapsed     = totalSeconds - Math.max(remainingSec, 0);
   const turtleRatio = countdownStarted ? Math.min(elapsed / totalSeconds, 1) : 0;
   const turtleX     = (W - 30) - raceW * turtleRatio;
   ctx.font = '28px serif'; ctx.textAlign = 'center';
   ctx.fillText('🐢', turtleX, ground - 10);

   // ウサギ（初期ボーナス＋タスクで進む）
   const taskProgress = (tasksDone / TOTAL_TASKS) * (1 - rabbitStartBonus);
   const rabbitRatio  = countdownStarted ? (rabbitStartBonus + taskProgress) : rabbitStartBonus;
   const rabbitX      = (W - 30) - raceW * rabbitRatio;
   const legOffset    = countdownStarted ? Math.sin(animFrame * 0.3) * 3 : 0;
   ctx.save();
   ctx.translate(rabbitX, ground - 10 + legOffset);
   ctx.fillText('🐇', 0, 0);
   ctx.restore();

   // 吹き出し
   if (countdownStarted && remainingSec > 0) {
    const isTurtleAhead = turtleX < rabbitX;
    const msg         = isTurtleAhead ? 'カメがはやい！！' : 'がんばれ！';
    const bubbleColor = isTurtleAhead ? '#dc2626' : '#f97316';
    const textColor   = isTurtleAhead ? '#dc2626' : '#c2410c';
    const bx = Math.max(rabbitX - 80, goalX + 4);
    const by = ground - 48;
    ctx.fillStyle = 'white'; ctx.strokeStyle = bubbleColor; ctx.lineWidth = 2;
    ctx.font = 'bold 12px sans-serif';
    const msgWidth = ctx.measureText(msg).width;
    roundRect(ctx, bx-2, by-16, msgWidth+16, 22, 8);
    ctx.fillStyle = textColor; ctx.textAlign = 'left';
    ctx.fillText(msg, bx+6, by-1);
   }

   animFrame++;
  }

  function roundRect(ctx, x, y, w, h, r) {
   ctx.beginPath();
   ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
   ctx.quadraticCurveTo(x+w, y, x+w, y+r);
   ctx.lineTo(x+w, y+h-r);
   ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
   ctx.lineTo(x+r, y+h);
   ctx.quadraticCurveTo(x, y+h, x, y+h-r);
   ctx.lineTo(x, y+r);
   ctx.quadraticCurveTo(x, y, x+r, y);
   ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // ── メインループ ──────────────────────
  function update() {
   const now = new Date();
   clockEl.textContent = now.toLocaleTimeString('ja-JP', { hour12: false });

   let remainingSec = 0;
   if (countdownStarted && endTime) {
    remainingSec = Math.floor((endTime - now) / 1000);
    if (remainingSec <= 0 && !isFinished && tasksDone < TOTAL_TASKS) {
     checkFinish(false); return;
    }
    const sec = Math.max(remainingSec, 0);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    timerEl.textContent = `あと ${m}:${s.toString().padStart(2,'0')}`;
    timerEl.style.color = sec < 3*60 ? '#dc2626' : '#ef4444';
   }
   drawRace(remainingSec);
  }

  // ── タスクトグル ──────────────────────
  function toggleTask(el) {
   if (isFinished || !countdownStarted) return;
   const isDone   = el.classList.toggle('done');
   const textOnly = el.querySelector('.task-text').textContent;
   tasksDone = document.querySelectorAll('.task-item.done').length;
   if (isDone) speak(textOnly + '、できたね！');
   if (tasksDone === TOTAL_TASKS) checkFinish(true);
  }

  // ── 結果 ──────────────────────────────
  function checkFinish(isSuccess) {
   isFinished = true;
   clearInterval(interval);
   overlay.style.display = 'flex';
   if (isSuccess) {
    resEmoji.textContent = '🐇🏆✨';
    resText.textContent  = 'ミッションクリア！\nウサギの勝ち！';
    speak('おめでとう！ミッションクリア！ウサギが勝ったよ！');
   } else {
    resEmoji.textContent = '🐢💨😫';
    resText.textContent  = 'カメに\nまけちゃった！\nあしたリベンジだ！';
    speak('カメに負けちゃった！でも次はきっと勝てるよ！');
   }
  }

  // ── 音声 ──────────────────────────────
  function speak(text) {
   const uttr = new SpeechSynthesisUtterance(text);
   uttr.lang = 'ja-JP'; uttr.rate = 1.2;
   window.speechSynthesis.cancel();
   window.speechSynthesis.speak(uttr);
  }

  const interval = setInterval(update, 1000);
  update();
 </script>
</body>
</html>
